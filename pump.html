<!DOCTYPE html>
<html lang="en" style="--bpm:124">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PUMP</title>
<style>
/* midiCSS — the layout is the song. Rows are pitches (row 1 = B5 … row 48 = C2),
   columns are 16th-note steps. Notes are <b> grid items; everything musical is
   encoded in CSS custom properties (--bpm, --steps, --wave, --vol, --hue, --vel). */

/* Registered properties: real interpolable numbers, so @keyframes on them
   are automation lanes. Cascade = mix hierarchy: !important (mutes, media
   queries) beats animations, animations beat inline base values. */
@property --vol { syntax: "<number>"; inherits: true; initial-value: 0.3; }
@property --bpm { syntax: "<number>"; inherits: true; initial-value: 120; }
@property --vel { syntax: "<number>"; inherits: true; initial-value: 1; }
@property --spread { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --cutoff { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --attack { syntax: "<number>"; inherits: true; initial-value: 0.005; }
@property --release { syntax: "<number>"; inherits: true; initial-value: 0.04; }
@property --loop { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --duck { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --form { syntax: "<number>"; inherits: true; initial-value: 1; }
@property --pan { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --width { syntax: "<number>"; inherits: true; initial-value: 0.3; }
@property --verb { syntax: "<number>"; inherits: true; initial-value: 0.15; }
@property --echo { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --echo-time { syntax: "<number>"; inherits: true; initial-value: 3; }
@property --fenv { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --vibrato { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --vib-rate { syntax: "<number>"; inherits: true; initial-value: 5; }

* { box-sizing: border-box; margin: 0; padding: 0; }

html { --cw: 18px; --rh: 16px; --panelw: min(400px, 80vw); color-scheme: dark; }

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: #0e0f13;
  color: #cfd3dc;
  font: 13px/1.45 ui-monospace, "SF Mono", Menlo, monospace;
}

/* ---- toolbar (chrome, rebuilt by JS on every load) ---- */
#bar {
  flex: none;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: #15171d;
  border-bottom: 1px solid #232733;
}
#bar label { display: inline-flex; align-items: center; gap: 5px; color: #7b8294; font-size: 11px; }
#bar button {
  padding: 5px 11px;
  background: #232733;
  color: #cfd3dc;
  border: 1px solid #303544;
  border-radius: 6px;
  font: inherit;
  cursor: pointer;
}
#bar button:hover { background: #2b3040; }
#bar input, #bar select {
  background: #0e0f13;
  color: #cfd3dc;
  border: 1px solid #303544;
  border-radius: 6px;
  padding: 4px 6px;
  font: inherit;
}
#bar input[type="number"] { width: 58px; }
#bar input[type="range"] { width: 80px; padding: 0; border: none; background: none; }
#bar input[type="text"] { width: 130px; }
#bar button.on { background: #3d52d5; border-color: #5e72ee; color: #fff; }
.chip { display: inline-flex; align-items: center; gap: 6px; }
.chip::before { content: ""; width: 10px; height: 10px; border-radius: 3px; background: hsl(var(--hue) 70% 58%); }
.chip.on { border-color: hsl(var(--hue) 70% 58%); background: #2b3040; }
.hint { margin-left: auto; color: #565d6e; font-size: 11px; }

/* per-song css-only mixer (static song markup — works with JS off) */
#mixer { flex: none; display: flex; flex-wrap: wrap; gap: 14px; padding: 6px 12px; background: #12141a; border-bottom: 1px solid #232733; font-size: 11px; color: #7b8294; }
#mixer label { display: inline-flex; gap: 5px; align-items: center; cursor: pointer; }
#mixer input { accent-color: #5e72ee; }
#mixer a { color: #7a8cf0; text-decoration: none; }
#mixer a:hover { text-decoration: underline; }

/* ---- piano roll ---- */
#wrap { flex: 1; display: flex; align-items: flex-start; overflow: auto; }

#keys {
  position: sticky;
  left: 0;
  z-index: 3;
  flex: none;
  display: grid;
  grid-template-rows: repeat(48, var(--rh));
  width: 44px;
  height: calc(48 * var(--rh));
  background: #15171d;
  border-right: 1px solid #232733;
}
#keys div { font-size: 9px; line-height: var(--rh); padding-left: 6px; color: #7b8294; border-bottom: 1px solid #1a1d25; }
#keys div.bk { background: #10131a; }
#keys div.c { color: #aeb6c6; }

#roll {
  position: relative;
  flex: none;
  width: calc(var(--steps) * var(--cw));
  height: calc(48 * var(--rh));
  cursor: crosshair;
  background-color: #0e0f13;
  background-image:
    /* bar lines */
    repeating-linear-gradient(to right, #303544 0 1px, transparent 1px calc(var(--cw) * 16)),
    /* beat lines */
    repeating-linear-gradient(to right, #232733 0 1px, transparent 1px calc(var(--cw) * 4)),
    /* row lines */
    repeating-linear-gradient(to bottom, #1a1d25 0 1px, transparent 1px var(--rh)),
    /* black-key rows: descending from B per octave -> A#, G#, F#, D#, C# */
    repeating-linear-gradient(to bottom,
      transparent 0 var(--rh),
      #13151c var(--rh) calc(var(--rh) * 2),
      transparent calc(var(--rh) * 2) calc(var(--rh) * 3),
      #13151c calc(var(--rh) * 3) calc(var(--rh) * 4),
      transparent calc(var(--rh) * 4) calc(var(--rh) * 5),
      #13151c calc(var(--rh) * 5) calc(var(--rh) * 6),
      transparent calc(var(--rh) * 6) calc(var(--rh) * 8),
      #13151c calc(var(--rh) * 8) calc(var(--rh) * 9),
      transparent calc(var(--rh) * 9) calc(var(--rh) * 10),
      #13151c calc(var(--rh) * 10) calc(var(--rh) * 11),
      transparent calc(var(--rh) * 11) calc(var(--rh) * 12)
    );
}

/* ---- tracks: stacked transparent grids sharing the roll's coordinates ---- */
.trk {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: repeat(48, var(--rh));
  grid-template-columns: repeat(var(--steps), var(--cw));
  grid-auto-columns: var(--cw);
  pointer-events: none;
}
.trk.live { z-index: 2; }

/* ---- notes: the data itself ---- */
.trk b {
  position: relative;
  display: block;
  min-width: 0;
  border-radius: 3px;
  border: 1px solid hsl(var(--hue) 75% 72% / 0.9);
  background: hsl(var(--hue) 65% 56% / 0.92);
  box-shadow: inset 0 1px 0 hsl(var(--hue) 80% 82% / 0.35);
  opacity: 0.22;
  /* notes may carry text (lyrics for --wave:voice tracks) */
  font: 8px/1.75 ui-monospace, Menlo, monospace;
  color: #000c;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}
.trk.live b {
  opacity: calc(0.5 + 0.5 * var(--vel, 1));
  pointer-events: auto;
  cursor: grab;
}
.trk.live b:hover { filter: brightness(1.25); }
.trk.live b::after {
  content: "";
  position: absolute;
  top: -2px;
  bottom: -2px;
  right: -3px;
  width: 8px;
  cursor: ew-resize;
}

/* live song-css editor (chrome) */
#csspanel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: var(--panelw);
  display: none;
  flex-direction: column;
  background: #15171d;
  border-left: 1px solid #232733;
  z-index: 10;
}
#csspanel.open { display: flex; }
#csspanel header { flex: none; padding: 7px 10px; font-size: 11px; color: #7b8294; border-bottom: 1px solid #232733; }
#csspanel textarea {
  flex: 1;
  padding: 10px;
  background: #0e0f13;
  color: #cfd3dc;
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  white-space: pre;
  tab-size: 2;
  font: 11px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
}
body.css-open #wrap { margin-right: var(--panelw); }

/* stylesheet-only notes: give a track's ::before/::after content + grid-area
   and the player hears it. Dashed border marks them as stylesheet creatures. */
.trk::before, .trk::after {
  border-radius: 3px;
  border: 1px dashed hsl(var(--hue) 75% 75% / 0.95);
  background: hsl(var(--hue) 65% 56% / 0.5);
}

#ph {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 2px;
  background: #fff;
  box-shadow: 0 0 6px #fff8;
  z-index: 4;
  pointer-events: none;
  display: none;
}
</style>
<style id="songcss">
/* ========== PUMP — arrangement (edit live via { } css) ========== */

body:has(#mute-hook:checked)  .trk[data-name="Hook"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-stabs:checked) .trk[data-name="Stabs"] { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-riff:checked)  .trk[data-name="Riff"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-arp:checked)   .trk[data-name="Arp"]   { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-pad:checked)   .trk[data-name="Pad"]   { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-body:checked)  .trk[data-name="Body"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-bass:checked)  .trk[data-name="Bass"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-kick:checked)  .trk[data-name="Kick"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-hats:checked)  .trk[data-name="Hats"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-clap:checked)  .trk[data-name="Clap"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-vox:checked)   .trk[data-name="Vox"]   { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }

/* acid: the offbeat bass goes 303 */
body:has(#acid:checked) .trk[data-name="Bass"] { --wave: sawtooth !important; }
html.playing:has(#acid:checked) #roll .trk[data-name="Bass"] { animation: acidx 3.4s ease-in-out infinite; }
@keyframes acidx { 0%, 100% { --cutoff: 300; } 50% { --cutoff: 3000; } }

/* tape: the whole record warbles */
html.playing:has(#tape:checked) #roll .trk { animation: warblex 17s ease-in-out infinite; }
@keyframes warblex {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(calc(var(--rh) * -0.15)); }
  70% { transform: translateY(calc(var(--rh) * 0.12)); }
}

body:has(#cathedral:checked) .trk { --verb: 0.55 !important; }
html:has(#hyper:checked) { --bpm: 134 !important; }

.trk { transition: --vol 1.2s ease; }

/* standing motion: the French-house filter LFO on the riff, plus the usual
   anti-MIDI layer (filter plucks, ±4-cent breath, stab filter wander) */
.trk { --fenv: 0.6; }
html.playing .trk { animation: microtape 23s ease-in-out infinite; }
@keyframes microtape {
  0%, 100% { translate: 0 0; }
  33% { translate: 0 calc(var(--rh) * -0.045); }
  66% { translate: 0 calc(var(--rh) * 0.035); }
}
html.playing .trk[data-name="Riff"] { animation: housefilter 31s ease-in-out infinite, microtape 23s ease-in-out infinite; }
@keyframes housefilter { 0%, 100% { --cutoff: 220; } 50% { --cutoff: 3200; } }
html.playing .trk[data-name="Stabs"] { animation: cutdrift 9.3s ease-in-out infinite, microtape 23s ease-in-out infinite; }
@keyframes cutdrift { 0%, 100% { --cutoff: 900; } 50% { --cutoff: 1800; } }

/* ========== FORM — 8 passes, the pump carries it ========== */
html { --form: 8; --duck: 0.45; }
/* 0: the wall rides the ramp (stabs included); rhythm section silent from
   sample one, hook held back */
html[data-pass="0"] :is(.trk[data-name="Kick"], .trk[data-name="Clap"], .trk[data-name="Bass"], .trk[data-name="Vox"], .trk[data-name="Hook"]) { --vol: 0 !important; transition: none; }
/* 1: the floor lands, full band — hook saves itself for pass 2 */
html[data-pass="1"] :is(.trk[data-name="Hook"], .trk[data-name="Vox"]) { --vol: 0 !important; }
/* 4: breakdown — floor drops out, stabs and pads swim */
html[data-pass="4"] :is(.trk[data-name="Kick"], .trk[data-name="Clap"], .trk[data-name="Bass"]) { --vol: 0 !important; }
html[data-pass="4"] .trk { --verb: 0.55 !important; }
/* 5-6: the drop — acid bass */
html[data-pass="5"] .trk[data-name="Bass"],
html[data-pass="6"] .trk[data-name="Bass"] { --wave: sawtooth !important; }
html.playing[data-pass="5"] .trk[data-name="Bass"],
html.playing[data-pass="6"] .trk[data-name="Bass"] { animation: acidx 3.4s ease-in-out infinite, microtape 23s ease-in-out infinite; }
/* 7: outro — back to the loop bones */
html[data-pass="7"] :is(.trk[data-name="Stabs"], .trk[data-name="Arp"], .trk[data-name="Pad"], .trk[data-name="Vox"], .trk[data-name="Hook"]) { --vol: 0 !important; }

/* the first pass ramps: turntable spin-up + one shared filter opening */
html.playing[data-pass="0"] #roll .trk {
  animation: rampcut calc(var(--steps) * 15s / var(--bpm)) ease-in 1, microtape 23s ease-in-out infinite, spinup 3.2s ease-out 1 !important;
}
@keyframes rampcut { 0% { --cutoff: 150; } 100% { --cutoff: 2800; } }
@keyframes spinup { 0% { translate: 0 calc(var(--rh) * 3); } 100% { translate: 0 0; } }
</style>
</head>
<body>
<nav id="mixer">
<span>css-only:</span>
<label><input type="checkbox" id="mute-hook"> mute hook</label>
<label><input type="checkbox" id="mute-stabs"> mute stabs</label>
<label><input type="checkbox" id="mute-riff"> mute riff</label>
<label><input type="checkbox" id="mute-arp"> mute arp</label>
<label><input type="checkbox" id="mute-pad"> mute pad</label>
<label><input type="checkbox" id="mute-body"> mute body</label>

<label><input type="checkbox" id="mute-hats"> mute hats</label>

      env.gain.linearRampToValueAtTime(1, when + attack);
      env.gain.linearRampToValueAtTime(0.75, Math.max(end - 0.02, when + attack));
      env.gain.linearRampToValueAtTime(0, end + release);
      const oscs = [];
      for (const det of detunes) {
        const osc = ctx.createOscillator();
        if (custom)
          osc.setPeriodicWave(custom);
        else
          osc.type = type;
        osc.frequency.value = freq;
        osc.detune.value = det;
        osc.connect(dest);
        osc.start(when);
        osc.stop(end + release + 0.05);
        oscs.push(osc);
      }
      const vib = cssNum(trk, "--vibrato", 0);
      if (vib > 0) {
        const lfo = ctx.createOscillator();
        lfo.frequency.value = Math.max(cssNum(trk, "--vib-rate", 5), 0.1);
        const depth = ctx.createGain();
        depth.gain.setValueAtTime(0, when);
        depth.gain.linearRampToValueAtTime(vib, when + 0.25);
        lfo.connect(depth);
        for (const o of oscs)
          depth.connect(o.detune);
        lfo.start(when);
        lfo.stop(end + release + 0.05);
      }
      voices.push({ trk, nb, oscs, lvl, mul, until: end + release });
    }
  };
  const updateVoices = (now) => {
    voices = voices.filter((v) => v.until > now);
    for (const v of voices) {
      const cur = v.nb.el !== null ? geoBox(v.nb.el) : v.nb.pseudo !== null ? pseudoBox(v.trk, v.nb.pseudo) : null;
      if (!cur) {
        v.lvl.gain.setTargetAtTime(0, now, 0.05);
        continue;
      }
      const freq = 440 * Math.pow(2, (cur.midi - 69) / 12);
      for (const o of v.oscs)
        o.frequency.setTargetAtTime(freq, now, 0.04);
      v.lvl.gain.setTargetAtTime(cssNum(v.trk, "--vol", 0.3) * cur.vel * v.mul, now, 0.08);
    }
  };
  for (const stale of document.querySelectorAll("[data-chrome]"))
    stale.remove();
  const ph = document.createElement("div");
  ph.id = "ph";
  ph.dataset.chrome = "1";
  roll.append(ph);
  const keys = document.createElement("div");
  keys.id = "keys";
  keys.dataset.chrome = "1";
  for (let row = 1;row <= ROWS; row++) {
    const midi = TOP_MIDI - (row - 1);
    const name = NAMES[midi % 12] ?? "";
    const cell = document.createElement("div");
    if (name.includes("#"))
      cell.className = "bk";
    if (name === "C") {
      cell.className = "c";
      cell.textContent = "C" + String(Math.floor(midi / 12) - 1);
    }
    keys.append(cell);
  }
  wrap.prepend(keys);
  const songCss = (() => {
    const found = document.querySelector("style#songcss");
    if (found instanceof HTMLStyleElement)
      return found;
    const s = document.createElement("style");
    s.id = "songcss";
    document.head.append(s);
    return s;
  })();
  const cssPanel = document.createElement("aside");
  cssPanel.id = "csspanel";
  cssPanel.dataset.chrome = "1";
  const cssHead = document.createElement("header");
  cssHead.textContent = "song css — edits apply live and save with the file";
  const cssArea = document.createElement("textarea");
  cssArea.spellcheck = false;
  cssArea.value = songCss.textContent ?? "";
  cssArea.addEventListener("input", () => {
    songCss.textContent = cssArea.value;
  });
  cssArea.addEventListener("keydown", (e) => {
    if (e.key === "Escape")
      cssArea.blur();
    if (e.key !== "Tab")
      return;
    e.preventDefault();
    cssArea.setRangeText("  ", cssArea.selectionStart, cssArea.selectionEnd, "end");
    songCss.textContent = cssArea.value;
  });
  cssPanel.append(cssHead, cssArea);
  document.body.append(cssPanel);
  const button = (label, onClick) => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = label;
    b.addEventListener("click", onClick);
    return b;
  };
  const labeled = (text, input) => {
    const l = document.createElement("label");
    l.append(text, input);
    return l;
  };
  const numInput = (value, min, max, onChange) => {
    const i = document.createElement("input");
    i.type = "number";
    i.min = String(min);
    i.max = String(max);
    i.value = String(value);
    i.addEventListener("change", () => {
      const v = clamp(parseFloat(i.value), min, max);
      if (Number.isFinite(v)) {
        i.value = String(v);
        onChange(v);
      }
    });
    return i;
  };
  const bar = document.createElement("header");
  bar.id = "bar";
  bar.dataset.chrome = "1";
  const playBtn = button("▶ play", () => toggle());
  playBtn.id = "play";
  const bpmIn = numInput(bpm(), 40, 300, (v) => {
    docEl.style.setProperty("--bpm", String(v));
  });
  const stepsIn = numInput(steps(), 16, 256, (v) => {
    roll.style.setProperty("--steps", String(v));
  });
  const chips = [];
  for (const trk of tracks()) {
    const chip = button(trk.dataset.name ?? "track", () => setLive(trk));
    chip.className = "chip";
    chip.style.setProperty("--hue", String(cssNum(trk, "--hue", 0)));
    chips.push({ chip, trk });
  }
  const waveSel = document.createElement("select");
  for (const w of ["sine", "triangle", "square", "sawtooth", "pulse25", "pulse125", "organ", "ep", "brass", "glass", "noise", "clap", "voice"]) {
    const o = document.createElement("option");
    o.value = w;
    o.textContent = w;
    waveSel.append(o);
  }
  waveSel.addEventListener("change", () => {
    live.style.setProperty("--wave", waveSel.value);
  });
  const volIn = document.createElement("input");
  volIn.type = "range";
  volIn.min = "0";
  volIn.max = "1";
  volIn.step = "0.05";
  volIn.addEventListener("input", () => {
    live.style.setProperty("--vol", volIn.value);
  });
  const titleIn = document.createElement("input");
  titleIn.type = "text";
  titleIn.value = document.title;
  titleIn.addEventListener("input", () => {
    document.title = titleIn.value;
  });
  const cssBtn = button("{ } css", () => {
    const open = !cssPanel.classList.contains("open");
    cssPanel.classList.toggle("open", open);
    document.body.classList.toggle("css-open", open);
    cssBtn.classList.toggle("on", open);
    if (open) {
      cssPanel.style.top = `${wrap.getBoundingClientRect().top}px`;
      cssArea.focus();
    }
  });
  cssBtn.id = "cssbtn";
  const hint = document.createElement("span");
  hint.className = "hint";
  hint.textContent = "draw: drag · move: drag note · resize: right edge · delete: alt-click · space: play";
  bar.append(playBtn, labeled("bpm", bpmIn), labeled("steps", stepsIn), ...chips.map((c) => c.chip), labeled("wave", waveSel), labeled("vol", volIn), labeled("song", titleIn), cssBtn, button("save .html", () => save()), hint);
  document.body.prepend(bar);
  function setLive(trk) {
    live = trk;
    for (const t of tracks())
      t.classList.toggle("live", t === trk);
    for (const c of chips)
      c.chip.classList.toggle("on", c.trk === trk);
    const w = cssStr(trk, "--wave");
    waveSel.value = w === "" ? "sine" : w;
    volIn.value = String(cssNum(trk, "--vol", 0.3));
  }
  let playing = false;
  let startAt = 0;
  let nextStep = 0;
  let timer = 0;
  let lastSd = 0;
  function tick() {
    const { ctx, echoDelay, echoDelay2 } = audio();
    const sd = stepSec();
    if (sd !== lastSd) {
      if (lastSd > 0)
        startAt += nextStep * (lastSd - sd);
      lastSd = sd;
      const et = sd * cssNum(docEl, "--echo-time", 3);
      echoDelay.delayTime.setTargetAtTime(et, ctx.currentTime, 0.1);
      echoDelay2.delayTime.setTargetAtTime(et, ctx.currentTime, 0.1);
    }
    const n = steps();
    const form = Math.max(1, Math.round(cssNum(docEl, "--form", 1)));
    if (form > 1) {
      const t = Math.max(0, ctx.currentTime - startAt);
      const pass = Math.floor(t / (sd * n)) % form;
      if (docEl.dataset.pass !== String(pass))
        docEl.dataset.pass = String(pass);
    } else if (docEl.dataset.pass !== undefined) {
      delete docEl.dataset.pass;
    }
    while (playing && startAt + nextStep * sd < ctx.currentTime + 0.18) {
      for (const trk of tracks()) {
        const lv = Math.round(cssNum(trk, "--loop", 0));
        const L = lv >= 1 ? lv : n;
        const sL = nextStep % L;
        const boxes = trackBoxes(trk, ctx.currentTime);
        for (const nb of boxes) {
          const w = (nb.step % L + L) % L;
          if (w >= sL && w < sL + 1) {
            playNote(trk, nb, startAt + (nextStep + w - sL) * sd, nb.len * sd);
          }
        }
      }
      nextStep++;
    }
    updateVoices(ctx.currentTime);
  }
  function frame() {
    if (!playing || !engine)
      return;
    const t = (engine.ctx.currentTime - startAt) / stepSec();
    const x = (t < 0 ? 0 : t % steps()) * cellW();
    ph.style.transform = `translateX(${x}px)`;
    requestAnimationFrame(frame);
  }
  function play() {
    const { ctx } = audio();
    ctx.resume();
    playing = true;
    startAt = ctx.currentTime + 0.06;
    nextStep = 0;
    lastSd = 0;
    tick();
    timer = window.setInterval(tick, 30);
    docEl.classList.add("playing");
    playBtn.textContent = "■ stop";
    playBtn.classList.add("on");
    ph.style.display = "block";
    requestAnimationFrame(frame);
  }
  function stop() {
    playing = false;
    window.clearInterval(timer);
    voices = [];
    if (typeof speechSynthesis !== "undefined")
      speechSynthesis.cancel();
    delete docEl.dataset.pass;
    docEl.classList.remove("playing");
    playBtn.textContent = "▶ play";
    playBtn.classList.remove("on");
    ph.style.display = "none";
  }
  function toggle() {
    if (playing)
      stop();
    else
      play();
  }
  let drag = null;
  const cellAt = (e) => {
    const r = roll.getBoundingClientRect();
    const col = clamp(Math.floor((e.clientX - r.left) / cellW()) + 1, 1, steps());
    const row = clamp(Math.floor((e.clientY - r.top) / rowH()) + 1, 1, ROWS);
    return { col, row };
  };
  roll.addEventListener("pointerdown", (e) => {
    if (e.button !== 0)
      return;
    const t = e.target;
    const { col, row } = cellAt(e);
    if (t instanceof HTMLElement && t.tagName === "B" && t.parentElement === live) {
      if (e.altKey) {
        t.remove();
        return;
      }
      const nb = gridBox(t);
      if (!nb)
        return;
      const rect = t.getBoundingClientRect();
      drag = {
        el: t,
        mode: e.clientX > rect.right - 8 ? "resize" : "move",
        grab: col - (nb.step + 1)
      };
    } else {
      const b = document.createElement("b");
      setBox(b, col - 1, 1, TOP_MIDI - (row - 1));
      live.append(b);
      drag = { el: b, mode: "resize", grab: 0 };
    }
    if (e.isTrusted)
      roll.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  roll.addEventListener("pointermove", (e) => {
    if (!drag)
      return;
    const { col, row } = cellAt(e);
    const nb = gridBox(drag.el);
    if (!nb)
      return;
    if (drag.mode === "move") {
      const step = clamp(col - drag.grab - 1, 0, steps() - nb.len);
      setBox(drag.el, step, nb.len, TOP_MIDI - (row - 1));
    } else {
      const len = clamp(col - nb.step, 1, steps() - nb.step);
      setBox(drag.el, nb.step, len, nb.midi);
    }
  });
  roll.addEventListener("pointerup", () => {
    if (!drag)
      return;
    const nb = geoBox(drag.el);
    drag = null;
    if (nb) {
      const { ctx } = audio();
      playNote(live, nb, ctx.currentTime + 0.01, Math.min(nb.len * stepSec(), 0.35));
    }
  });
  roll.addEventListener("contextmenu", (e) => {
    const t = e.target;
    if (t instanceof HTMLElement && t.tagName === "B" && t.parentElement === live) {
      e.preventDefault();
      t.remove();
    }
  });
  window.addEventListener("keydown", (e) => {
    if (e.code !== "Space")
      return;
    const t = e.target;
    if (t instanceof HTMLInputElement || t instanceof HTMLSelectElement || t instanceof HTMLTextAreaElement)
      return;
    e.preventDefault();
    toggle();
  });
  function save() {
    if (playing)
      stop();
    const clone = docEl.cloneNode(true);
    if (!(clone instanceof HTMLElement))
      return;
    for (const el of clone.querySelectorAll("[data-chrome]"))
      el.remove();
    for (const el of clone.querySelectorAll(".live"))
      el.classList.remove("live");
    clone.classList.remove("playing");
    clone.removeAttribute("data-pass");
    const bodyClone = clone.querySelector("body");
    if (bodyClone)
      bodyClone.classList.remove("css-open");
    const file = `<!DOCTYPE html>
` + clone.outerHTML;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([file], { type: "text/html" }));
    a.download = (document.title.trim() || "song").replace(/[^\w-]+/g, "-").toLowerCase() + ".html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  setLive(live);
  wrap.scrollTop = Math.max(0, 28 * rowH() - wrap.clientHeight / 2);
}
</script>
</body>
</html>
