<!DOCTYPE html>
<html lang="en" style="--bpm:132">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLUE 31</title>
<style>
/* midiCSS — the layout is the song. Rows are pitches (row 1 = B5 … row 48 = C2),
   columns are 16th-note steps. Notes are <b> grid items; everything musical is
   encoded in CSS custom properties (--bpm, --steps, --wave, --vol, --hue, --vel). */

/* Registered properties: real interpolable numbers, so @keyframes on them
   are automation lanes. Cascade = mix hierarchy: !important (mutes, media
   queries) beats animations, animations beat inline base values. */
@property --vol { syntax: "<number>"; inherits: true; initial-value: 0.3; }
@property --bpm { syntax: "<number>"; inherits: true; initial-value: 120; }
@property --vel { syntax: "<number>"; inherits: true; initial-value: 1; }
@property --spread { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --cutoff { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --attack { syntax: "<number>"; inherits: true; initial-value: 0.005; }
@property --release { syntax: "<number>"; inherits: true; initial-value: 0.04; }
@property --loop { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --duck { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --form { syntax: "<number>"; inherits: true; initial-value: 1; }
@property --root { syntax: "<number>"; inherits: true; initial-value: 60; }
@property --sidechain { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --master { syntax: "<number>"; inherits: true; initial-value: 1; }
@property --pan { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --width { syntax: "<number>"; inherits: true; initial-value: 0.3; }
@property --verb { syntax: "<number>"; inherits: true; initial-value: 0.15; }
@property --echo { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --echo-time { syntax: "<number>"; inherits: true; initial-value: 3; }
@property --fenv { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --vibrato { syntax: "<number>"; inherits: true; initial-value: 0; }
@property --vib-rate { syntax: "<number>"; inherits: true; initial-value: 5; }

* { box-sizing: border-box; margin: 0; padding: 0; }

html { --cw: 18px; --rh: 16px; --panelw: min(400px, 80vw); color-scheme: dark; }

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: #0e0f13;
  color: #cfd3dc;
  font: 13px/1.45 ui-monospace, "SF Mono", Menlo, monospace;
}

/* ---- toolbar (chrome, rebuilt by JS on every load) ---- */
#bar {
  flex: none;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: #15171d;
  border-bottom: 1px solid #232733;
}
#bar label { display: inline-flex; align-items: center; gap: 5px; color: #7b8294; font-size: 11px; }
#bar button {
  padding: 5px 11px;
  background: #232733;
  color: #cfd3dc;
  border: 1px solid #303544;
  border-radius: 6px;
  font: inherit;
  cursor: pointer;
  transition: scale 0.15s cubic-bezier(0.2, 0, 0, 1), background 0.15s ease;
}
#bar button:hover { background: #2b3040; }
#bar button:active { scale: 0.96; }
#bar input, #bar select {
  background: #0e0f13;
  color: #cfd3dc;
  border: 1px solid #303544;
  border-radius: 6px;
  padding: 4px 6px;
  font: inherit;
}
#bar input[type="number"] { width: 58px; }
#bar input[type="range"] { width: 80px; padding: 0; border: none; background: none; }
#bar input[type="text"] { width: 130px; }
#bar button.on { background: #3d52d5; border-color: #5e72ee; color: #fff; }
.chip { display: inline-flex; align-items: center; gap: 6px; }
.chip::before { content: ""; width: 10px; height: 10px; border-radius: 3px; background: hsl(var(--hue) 70% 58%); }
.chip.on { border-color: hsl(var(--hue) 70% 58%); background: #2b3040; }
.hint { margin-left: auto; color: #565d6e; font-size: 11px; }

/* per-song css-only mixer (static song markup — works with JS off) */
#mixer { flex: none; display: flex; flex-wrap: wrap; gap: 14px; padding: 6px 12px; background: #12141a; border-bottom: 1px solid #232733; font-size: 11px; color: #7b8294; }
#mixer label { display: inline-flex; gap: 5px; align-items: center; cursor: pointer; }
#mixer input { accent-color: #5e72ee; }
#mixer a { color: #7a8cf0; text-decoration: none; }
#mixer a:hover { text-decoration: underline; }

/* ---- piano roll ---- */
#wrap { flex: 1; display: flex; align-items: flex-start; overflow: auto; }

#keys {
  position: sticky;
  left: 0;
  z-index: 3;
  flex: none;
  display: grid;
  grid-template-rows: repeat(48, var(--rh));
  width: 44px;
  height: calc(48 * var(--rh));
  background: #15171d;
  border-right: 1px solid #232733;
}
#keys div { font-size: 9px; line-height: var(--rh); padding-left: 6px; color: #7b8294; border-bottom: 1px solid #1a1d25; }
#keys div.bk { background: #10131a; }
#keys div.c { color: #aeb6c6; }

#roll {
  position: relative;
  flex: none;
  width: calc(var(--steps) * var(--cw));
  height: calc(48 * var(--rh));
  cursor: crosshair;
  background-color: #0e0f13;
  background-image:
    /* bar lines */
    repeating-linear-gradient(to right, #303544 0 1px, transparent 1px calc(var(--cw) * 16)),
    /* beat lines */
    repeating-linear-gradient(to right, #232733 0 1px, transparent 1px calc(var(--cw) * 4)),
    /* row lines */
    repeating-linear-gradient(to bottom, #1a1d25 0 1px, transparent 1px var(--rh)),
    /* black-key rows: descending from B per octave -> A#, G#, F#, D#, C# */
    repeating-linear-gradient(to bottom,
      transparent 0 var(--rh),
      #13151c var(--rh) calc(var(--rh) * 2),
      transparent calc(var(--rh) * 2) calc(var(--rh) * 3),
      #13151c calc(var(--rh) * 3) calc(var(--rh) * 4),
      transparent calc(var(--rh) * 4) calc(var(--rh) * 5),
      #13151c calc(var(--rh) * 5) calc(var(--rh) * 6),
      transparent calc(var(--rh) * 6) calc(var(--rh) * 8),
      #13151c calc(var(--rh) * 8) calc(var(--rh) * 9),
      transparent calc(var(--rh) * 9) calc(var(--rh) * 10),
      #13151c calc(var(--rh) * 10) calc(var(--rh) * 11),
      transparent calc(var(--rh) * 11) calc(var(--rh) * 12)
    );
}

/* ---- tracks: stacked transparent grids sharing the roll's coordinates ---- */
.trk {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: repeat(48, var(--rh));
  grid-template-columns: repeat(var(--steps), var(--cw));
  grid-auto-columns: var(--cw);
  pointer-events: none;
}
.trk.live { z-index: 2; }

/* ---- notes: the data itself ---- */
.trk b {
  position: relative;
  display: block;
  min-width: 0;
  border-radius: 3px;
  border: 1px solid hsl(var(--hue) 75% 72% / 0.9);
  background: hsl(var(--hue) 65% 56% / 0.92);
  box-shadow: inset 0 1px 0 hsl(var(--hue) 80% 82% / 0.35);
  opacity: 0.22;
  /* notes may carry text (lyrics for --wave:voice tracks) */
  font: 8px/1.75 ui-monospace, Menlo, monospace;
  color: #000c;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
}
.trk.live b {
  opacity: calc(0.5 + 0.5 * var(--vel, 1));
  pointer-events: auto;
  cursor: grab;
}
.trk.live b:hover { filter: brightness(1.25); }
.trk.live b::after {
  content: "";
  position: absolute;
  top: -2px;
  bottom: -2px;
  right: -3px;
  width: 8px;
  cursor: ew-resize;
}

/* ---- embed mode (?embed): chrome slims to one floating play control ---- */
html.embed body { position: relative; }
html.embed #bar {
  position: absolute;
  left: 12px;
  bottom: 12px;
  z-index: 20;
  padding: 0;
  background: none;
  border: none;
}
html.embed #bar > :not(#play) { display: none; }
html.embed #play {
  width: 48px;
  height: 44px; /* ≥40px hit area */
  border-radius: 22px;
  border: none;
  font-size: 15px;
  text-indent: 2px; /* optical centering for the ▶ glyph */
  background: rgba(22, 25, 35, 0.88);
  backdrop-filter: blur(6px);
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.45),
    0 6px 18px rgba(0, 0, 0, 0.35),
    inset 0 0 0 1px rgba(255, 255, 255, 0.09);
}
html.embed #play.on { background: #3d52d5; }
html.embed .hint { display: none; }

/* live song-css editor (chrome) */
#csspanel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: var(--panelw);
  display: none;
  flex-direction: column;
  background: #15171d;
  border-left: 1px solid #232733;
  z-index: 10;
}
#csspanel.open { display: flex; }
#csspanel header { flex: none; padding: 7px 10px; font-size: 11px; color: #7b8294; border-bottom: 1px solid #232733; }
#csspanel textarea {
  flex: 1;
  padding: 10px;
  background: #0e0f13;
  color: #cfd3dc;
  border: none;
  outline: none;
  resize: none;
  overflow: auto;
  white-space: pre;
  tab-size: 2;
  font: 11px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
}
body.css-open #wrap { margin-right: var(--panelw); }

/* stylesheet-only notes: give a track's ::before/::after content + grid-area
   and the player hears it. Dashed border marks them as stylesheet creatures. */
.trk::before, .trk::after {
  border-radius: 3px;
  border: 1px dashed hsl(var(--hue) 75% 75% / 0.95);
  background: hsl(var(--hue) 65% 56% / 0.5);
}

#ph {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  width: 2px;
  background: #fff;
  box-shadow: 0 0 6px #fff8;
  z-index: 4;
  pointer-events: none;
  display: none;
}
</style>
<style id="songcss">
/* ========== BLUE 31 — arrangement (edit live via { } css) ==========
   Swing and microtones are inline transforms on the notes themselves:
   translateX = timing (the "and" of each beat lands at 2/3), translateY =
   cents (blue thirds at the quarter-tone, sevenths 31 cents flat). */

@media (max-width: 700px) {
  html { --bpm: 112 !important; }
}

body:has(#mute-horn:checked)  .trk[data-name="Horn"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-keys:checked)  .trk[data-name="Keys"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-bass:checked)  .trk[data-name="Bass"]  { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }
body:has(#mute-drums:checked) .trk[data-name="Drums"] { --vol: 0 !important; filter: grayscale(1) brightness(0.6); }

/* the A/B test: strip every transform and hear the same chart played
   straight, in 12-TET, dead on the grid. This is what you'd lose. */
body:has(#quantize:checked) .trk b { transform: none !important; margin: 0 !important; }

/* the keys' filter slowly opens and closes (--cutoff is a registered number) */
html.playing .trk[data-name="Keys"] { animation: sweep 23s ease-in-out infinite; }
@keyframes sweep { 0%, 100% { --cutoff: 700; } 50% { --cutoff: 2600; } }

/* dither: co-prime nth-child cycles (3,5,7,11 — period 1155) hand every note
   its own pseudo-random ±cents and ±milliseconds. Margins, not transforms,
   so it stacks on top of each note's own swing and detune. */
body:has(#dither:checked) .trk b:nth-child(3n)    { margin-left: 1.5px; margin-top: -1px; }
body:has(#dither:checked) .trk b:nth-child(5n+1)  { margin-left: -1px; margin-top: 1.2px; }
body:has(#dither:checked) .trk b:nth-child(7n+2)  { margin-left: 2px; margin-top: 0.8px; }
body:has(#dither:checked) .trk b:nth-child(11n+4) { margin-left: 0.5px; margin-top: -1.4px; }

/* drunk: the horn's whole sense of time drifts and recovers over 13s */
html.playing:has(#drunk:checked) .trk[data-name="Horn"] { animation: drunk 13s ease-in-out infinite; }
@keyframes drunk {
  0%, 100% { transform: translateX(calc(var(--cw) * -0.25)); }
  50% { transform: translateX(calc(var(--cw) * 0.45)); }
}

/* tape: the whole band warbles together — relative tuning stays intact
   (declared after drunk, so it wins on the Horn when both are on) */
html.playing:has(#tape:checked) #roll .trk { animation: warble 17s ease-in-out infinite; }
@keyframes warble {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(calc(var(--rh) * -0.15)); }
  70% { transform: translateY(calc(var(--rh) * 0.12)); }
}

html:has(#uptempo:checked) { --bpm: 176 !important; }

.trk { transition: --vol 1.2s ease; }

/* standing motion: filter plucks, ±4-cent breath, horn filter wander */
.trk { --fenv: 0.6; }
html.playing .trk { animation: microtape 23s ease-in-out infinite; }
@keyframes microtape {
  0%, 100% { translate: 0 0; }
  33% { translate: 0 calc(var(--rh) * -0.045); }
  66% { translate: 0 calc(var(--rh) * 0.035); }
}
html.playing .trk[data-name="Horn"] { animation: cutdrift 9.3s ease-in-out infinite, microtape 23s ease-in-out infinite; }
@keyframes cutdrift { 0%, 100% { --cutoff: 1400; } 50% { --cutoff: 2600; } }
</style>
</head>

<script>
const ROWS = 48;
const TOP_MIDI = 83;
const NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const docEl = document.documentElement;
const rollFound = document.querySelector("#roll");
const wrapFound = document.querySelector("#wrap");
if (rollFound instanceof HTMLElement && wrapFound instanceof HTMLElement) {
  init(rollFound, wrapFound);
}
function init(roll, wrap) {
  const embedded = location.search.includes("embed");
  if (embedded)
    docEl.classList.add("embed");

    const v = parseFloat(getComputedStyle(el).getPropertyValue(prop));
    return Number.isFinite(v) ? v : fallback;
  };
  const cssStr = (el, prop) => getComputedStyle(el).getPropertyValue(prop).trim();
  const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
  const bpm = () => cssNum(docEl, "--bpm", 120);
  const steps = () => Math.max(1, Math.round(cssNum(roll, "--steps", 64)));
  const cellW = () => cssNum(docEl, "--cw", 18);
  const rowH = () => cssNum(docEl, "--rh", 16);
  const stepSec = () => 15 / bpm();
  const tracks = () => {
    const found = [];
    for (const t of roll.querySelectorAll(".trk")) {
      if (t instanceof HTMLElement)
        found.push(t);
    }
    return found;
  };
  const gridBox = (b) => {
    const row = parseInt(b.style.gridRowStart, 10);
    const c1 = parseInt(b.style.gridColumnStart, 10);
    if (!Number.isFinite(row) || !Number.isFinite(c1))
      return null;
    const c2 = parseInt(b.style.gridColumnEnd, 10);
    const vel = parseFloat(getComputedStyle(b).getPropertyValue("--vel"));
    return {
      step: c1 - 1,
      len: Number.isFinite(c2) ? Math.max(c2 - c1, 1) : 1,
      midi: TOP_MIDI - (row - 1),
      vel: Number.isFinite(vel) ? vel : 1,
      el: b,
      pseudo: null
    };
  };
  const snap = (v) => {
    const r = Math.round(v);
    return Math.abs(v - r) < 0.02 ? r : v;
  };
  const geoBox = (b) => {
    const r = b.getBoundingClientRect();
    if (r.width < 0.5 || r.height < 0.5)
      return null;
    const base = roll.getBoundingClientRect();
    const vel = parseFloat(getComputedStyle(b).getPropertyValue("--vel"));
    return {
      step: snap((r.left - base.left) / cellW()),
      len: snap(r.width / cellW()),
      midi: snap(TOP_MIDI - ((r.top + r.height / 2 - base.top) / rowH() - 0.5)),
      vel: Number.isFinite(vel) ? vel : 1,
      el: b,
      pseudo: null
    };
  };
  const setBox = (b, step, len, midi) => {
    const row = TOP_MIDI - midi + 1;
    b.style.gridArea = `${row}/${step + 1}/${row + 1}/${step + 1 + len}`;
  };
  const PSEUDOS = ["::before", "::after"];
  const pseudoBox = (trk, which) => {
    const ps = getComputedStyle(trk, which);
    if (ps.content === "none" || ps.content === "normal" || ps.display === "none")
      return null;
    const row = parseInt(ps.gridRowStart, 10);
    const c1 = parseInt(ps.gridColumnStart, 10);
    if (!Number.isFinite(row) || !Number.isFinite(c1))
      return null;
    const c2 = parseInt(ps.gridColumnEnd, 10);
    const span = Number.isFinite(c2) ? Math.max(c2 - c1, 1) : 1;
    let dx = 0;
    let dy = 0;
    let sx = 1;
    const tf = ps.transform;
    if (tf.startsWith("matrix(")) {
      const p = tf.slice(7, -1).split(",").map((v) => parseFloat(v));
      sx = p[0] ?? 1;
      dx = p[4] ?? 0;
      dy = p[5] ?? 0;
    }
    const vel = parseFloat(ps.getPropertyValue("--vel"));
    return {
      step: snap(c1 - 1 + dx / cellW()),
      len: snap(span * sx),
      midi: snap(TOP_MIDI - (row - 1) - dy / rowH()),
      vel: Number.isFinite(vel) ? vel : 1,
      el: null,
      pseudo: which

  };

  };

      if (!hit.animated || hit.base === null || hit.sec === null)
        return hit.boxes;
      const s1 = secRect(trk);
      const s0 = hit.sec;
      const sx = s0.w === 0 ? 1 : s1.w / s0.w;
      const sy = s0.h === 0 ? 1 : s1.h / s0.h;
      const cw = cellW();
      const rh = rowH();
      for (let i = 0;i < hit.boxes.length; i++) {

        o.midi = TOP_MIDI - ((s1.top + (y0 - s0.top) * sy) / rh - 0.5);

      return hit.boxes;
    }
    const boxes = [];
    for (const b of trk.children) {
      if (!(b instanceof HTMLElement) || b.tagName !== "B")
        continue;
      const nb = geoBox(b);
      if (nb)
        boxes.push(nb);
    }
    for (const which of PSEUDOS) {
      const nb = pseudoBox(trk, which);
      if (nb)
        boxes.push(nb);
    }
    const animated = trk.getAnimations({ subtree: true }).length > 0;
    boxCache.set(trk, {
      gen: cacheGen,
      at: now,
      ttl: (animated ? 1 : CACHE_TTL) + cacheJitter++ % 8 * 0.17,
      animated,

      sec: animated ? secRect(trk) : null

  };

    const col = clamp(Math.floor((e.clientX - r.left) / cellW()) + 1, 1, steps());
    const row = clamp(Math.floor((e.clientY - r.top) / rowH()) + 1, 1, ROWS);
    return { col, row };
  };
  roll.addEventListener("pointerdown", (e) => {
    if (e.button !== 0)
      return;
    const t = e.target;
    const { col, row } = cellAt(e);
    if (t instanceof HTMLElement && t.tagName === "B" && t.parentElement === live) {
      if (e.altKey) {
        t.remove();
        return;
      }
      const nb = gridBox(t);
      if (!nb)
        return;
      const rect = t.getBoundingClientRect();
      drag = {
        el: t,
        mode: e.clientX > rect.right - 8 ? "resize" : "move",
        grab: col - (nb.step + 1)
      };
    } else {
      const b = document.createElement("b");
      setBox(b, col - 1, 1, TOP_MIDI - (row - 1));
      live.append(b);
      drag = { el: b, mode: "resize", grab: 0 };
    }
    if (e.isTrusted)
      roll.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  roll.addEventListener("pointermove", (e) => {
    if (!drag)
      return;
    const { col, row } = cellAt(e);
    const nb = gridBox(drag.el);
    if (!nb)
      return;
    if (drag.mode === "move") {
      const step = clamp(col - drag.grab - 1, 0, steps() - nb.len);
      setBox(drag.el, step, nb.len, TOP_MIDI - (row - 1));
    } else {
      const len = clamp(col - nb.step, 1, steps() - nb.step);
      setBox(drag.el, nb.step, len, nb.midi);
    }
  });
  roll.addEventListener("pointerup", () => {
    if (!drag)
      return;
    const nb = geoBox(drag.el);
    drag = null;
    if (nb) {
      const { ctx } = audio();
      playNote(live, nb, ctx.currentTime + 0.01, Math.min(nb.len * stepSec(), 0.35));
    }
  });
  roll.addEventListener("contextmenu", (e) => {
    const t = e.target;
    if (t instanceof HTMLElement && t.tagName === "B" && t.parentElement === live) {
      e.preventDefault();
      t.remove();
    }
  });
  window.addEventListener("keydown", (e) => {
    if (e.code !== "Space")
      return;
    const t = e.target;
    if (t instanceof HTMLInputElement || t instanceof HTMLSelectElement || t instanceof HTMLTextAreaElement)
      return;
    e.preventDefault();
    toggle();
  });
  function save() {
    if (playing)
      stop();
    const clone = docEl.cloneNode(true);
    if (!(clone instanceof HTMLElement))
      return;
    for (const el of clone.querySelectorAll("[data-chrome]"))
      el.remove();
    for (const el of clone.querySelectorAll(".live"))
      el.classList.remove("live");
    clone.classList.remove("playing");
    clone.classList.remove("embed");
    clone.removeAttribute("data-pass");
    const bodyClone = clone.querySelector("body");
    if (bodyClone)
      bodyClone.classList.remove("css-open");
    const file = `<!DOCTYPE html>
` + clone.outerHTML;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([file], { type: "text/html" }));
    a.download = (document.title.trim() || "song").replace(/[^\w-]+/g, "-").toLowerCase() + ".html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  setLive(live);
  for (const trk of tracks()) {
    const w = cssStr(trk, "--wave");
    if (w.startsWith("url("))
      loadSample(w);
  }
  wrap.scrollTop = Math.max(0, 28 * rowH() - wrap.clientHeight / 2);
}
</script>
</body>
</html>
